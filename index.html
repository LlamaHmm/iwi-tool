<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<!-- ホーム画面追加時にアプリとして全画面起動（Safariが開かない） -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IWI!運営">
<title>IWI!運営ツール</title>
<link rel="manifest" href="manifest.json">
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #1a73e8; }
  /* ステータスバー（ノッチ）分だけiframeを下げて、ヘッダーの見切れを防ぐ。
     空いた上部は背景の青で埋まり、ヘッダーと一体に見える */
  body { padding-top: env(safe-area-inset-top); box-sizing: border-box; }
  iframe { border: 0; width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
<iframe src="https://script.google.com/macros/s/AKfycbwM84z0vFWDZOOlZKoP_xdsHjCy22yxtfg6pSx5BpMOUtQ3IYKvaVrT3iU0HpqizOmPXA/exec" allow="clipboard-write"></iframe>
</body>
</html>
